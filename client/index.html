<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Bhat Imported Clothes - Admin Panel</title>
    <meta name="description" content="Admin panel for Bhat Imported Clothes - Manage products, categories, and inventory." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  </head>

  <body class="dark">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if (typeof %VITE_ANALYTICS_ENDPOINT% !== 'undefined' && %VITE_ANALYTICS_ENDPOINT% && typeof %VITE_ANALYTICS_WEBSITE_ID% !== 'undefined' && %VITE_ANALYTICS_WEBSITE_ID%) {
        const script = document.createElement('script');
        script.defer = true;
        script.src = '%VITE_ANALYTICS_ENDPOINT%/umami';
        script.setAttribute('data-website-id', '%VITE_ANALYTICS_WEBSITE_ID%');
        document.head.appendChild(script);
      }
    </script>
  </body>

</html>
